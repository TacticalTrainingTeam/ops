services:
  socket-proxy:
    image: "lscr.io/linuxserver/socket-proxy:3.4.1"
    container_name: "socket-proxy"
    security_opt:
      - "label:disable"
      - "no-new-privileges:true"
    environment:
      CONTAINERS: 1
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    restart: "unless-stopped"
    read_only: true
    tmpfs:
      - "/run"
  traefik:
    container_name: "traefik"
    image: "traefik:v3.7.6"
    restart: "unless-stopped"
    security_opt:
      - "no-new-privileges:true"
    ports:
      - "${ENTRYPOINT_INTERNAL_IPV4:?error}:80:8080"
      - "${ENTRYPOINT_INTERNAL_IPV4:?error}:443:8443"
      - "${ENTRYPOINT_INTERNAL_IPV4:?error}:443:8443/udp" # http3
      - "[${ENTRYPOINT_INTERNAL_IPV6:?error}]:80:8080"
      - "[${ENTRYPOINT_INTERNAL_IPV6:?error}]:443:8443"
      - "[${ENTRYPOINT_INTERNAL_IPV6:?error}]:443:8443/udp" # http3
      - "${ENTRYPOINT_EXTERNAL_IPV4:?error}:80:80"
      - "${ENTRYPOINT_EXTERNAL_IPV4:?error}:443:443"
      - "${ENTRYPOINT_EXTERNAL_IPV4:?error}:443:443/udp" # http3
      - "[${ENTRYPOINT_EXTERNAL_IPV6:?error}]:80:80"
      - "[${ENTRYPOINT_EXTERNAL_IPV6:?error}]:443:443"
      - "[${ENTRYPOINT_EXTERNAL_IPV6:?error}]:443:443/udp" # http3
      - "8090:8090"
    healthcheck:
      test: [ 'CMD', 'traefik', 'healthcheck', '--ping' ]
    volumes:
      - "${DOCKER_DATA_DIR:?error}/${COMPOSE_PROJECT_NAME:?error}/letsencrypt:/letsencrypt:z" # Volume to store the Let's Encrypt certificates
      - "${DOCKER_DATA_DIR:?error}/${COMPOSE_PROJECT_NAME:?error}/rules:/rules:z" # Volume to store traefik dynamic configuration files
      - "${DOCKER_DATA_DIR:?error}/${COMPOSE_PROJECT_NAME:?error}/logs:/logs:z" # Volume to store traefik logs
    environment:
      TZ: "Europe/Berlin"
      CF_DNS_API_TOKEN: "${CF_DNS_API_TOKEN:?error}" # Environment variable for Cloudflare API key
      DOMAINNAME_1:  "${DOMAINNAME_1:?error}" # Environment variable for the primary domain name
    configs:
      - source: "traefik_static"
        target: "/etc/traefik/traefik.yaml"
    networks:
      default:
      proxy:
    labels:
      traefik.enable: true
      traefik.http.routers.traefik.entrypoints: "websecure-internal"
      traefik.http.routers.traefik.rule: "Host(`traefik.${DOMAINNAME_1?error}`)"
      traefik.http.routers.traefik.service: "api@internal"
      traefik.http.routers.traefik.middlewares: "authentik"
      traefik.http.middlewares.xff2realip.plugin.traefik-xff-to-xrealip.depth: 0

  whoami:
    image: "traefik/whoami:v1.11.0"
    container_name: "whoami"
    restart: "unless-stopped"
    security_opt:
      - "no-new-privileges:true"
    networks:
      proxy:
    labels:
      traefik.enable: true
      traefik.http.routers.whoami.entrypoints: "websecure-external,websecure-internal"
      traefik.http.routers.whoami.rule: "Host(`whoami.${DOMAINNAME_1}`)"
      traefik.http.routers.whoami.service: "whoami"
      traefik.http.services.whoami.loadbalancer.server.port: 80
      traefik.http.routers.whoami.middlewares: "authentik"
networks:
  default: {}
  proxy:
    name: "proxy"
configs:
  traefik_static:
    content: |
      global:
        checkNewVersion: true
        sendAnonymousUsage: false
      
      entryPoints:
        web-external:
          address: ":80"
          forwardedHeaders:
            trustedIPs: &trustedIps
              # Cloudflare IP ranges, as from https://www.cloudflare.com/ips/
              - "173.245.48.0/20"
              - "103.21.244.0/22"
              - "103.22.200.0/22"
              - "103.31.4.0/22"
              - "141.101.64.0/18"
              - "108.162.192.0/18"
              - "190.93.240.0/20"
              - "188.114.96.0/20"
              - "197.234.240.0/22"
              - "198.41.128.0/17"
              - "162.158.0.0/15"
              - "104.16.0.0/13"
              - "104.24.0.0/14"
              - "172.64.0.0/13"
              - "131.0.72.0/22"
              - "2400:cb00::/32"
              - "2606:4700::/32"
              - "2803:f800::/32"
              - "2405:b500::/32"
              - "2405:8100::/32"
              - "2a06:98c0::/29"
              - "2c0f:f248::/32"
              # Docker network IP range
              - "172.16.0.0/16"
              - "${NETWORK_SUBNET:?error}"
          http:
            middlewares:
              - "xff2realip@docker"
            redirections:
              entryPoint:
                to: websecure-external
                scheme: https
                permanent: true
        web-internal:
          address: ":8080"
          http:
            redirections:
              entryPoint:
                to: websecure-internal
                scheme: https
                permanent: true
        websecure-external:
          address: ":443"
          http3: true
          forwardedHeaders:
            trustedIPs: *trustedIps
          http:
            middlewares:
              - "xff2realip@docker"
            tls:
              certResolver: "letsencrypt"
              domains:
                - main: "${DOMAINNAME_1}"
                  sans:
                    - "*.${DOMAINNAME_1}"
        websecure-internal:
          address: ":8443"
          http3:
            advertisedPort: 443
          http:
            tls:
              certResolver: letsencrypt
              domains:
                - main: "${DOMAINNAME_1}"
                  sans:
                    - "*.${DOMAINNAME_1}"
          observability:
            accessLogs: false
        traefik:
          address: ":8090"
      
      api:
        dashboard: true
        insecure: true
      
      ping: {}
      
      log:
        filePath: "/logs/traefik.log"
        level: "INFO"  # (Default: error) DEBUG, INFO, WARN, ERROR, FATAL, PANIC
        format: "json"  # (Default: common) common, json
        maxSize: 20
        maxBackups: 10
        compress: true
      
      accessLog:
        filePath: "/logs/access.log"
        format: "json"  # (Default: common) common, json
        bufferingSize: 0
        fields:
          defaultMode: keep
          headers:
            defaultMode: keep
            names:
              Authorization: redact
              Cookie: redact
              Set-Cookie: redact
      
      providers:
        docker:
          endpoint: "tcp://socket-proxy:2375"
          exposedByDefault: false
          network: "proxy"
        file:
          directory: "/rules"  # Load dynamic configuration from one or more .toml or .yml files in a directory
          watch: true          # Only works on top level files in the rules folder
      
      certificatesResolvers:
        letsencrypt:
          acme:
            dnsChallenge:
              provider: "cloudflare"
            email: "${DOMAINNAME_1_EMAIL:?error}"
            storage: "/letsencrypt/acme.json"
            caServer: "https://acme-v02.api.letsencrypt.org/directory"
      
      experimental:
        plugins:
          traefik-xff-to-xrealip:
            moduleName: github.com/jeppestaerk/traefik-xff-to-xrealip
            version: v0.1.3
          bandwidth-limiter:
            moduleName: github.com/hhftechnology/bandwidthlimiter
            version: v1.0.1
      
